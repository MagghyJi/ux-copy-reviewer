<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skilled Reviewer</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.cdnfonts.com/css/intel-one-mono" rel="stylesheet">
    
    <!-- Markdown Parser -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- Styles -->
    <style>
:root {
    /* Exact colors from user spec */
    --bg-dark: #131613;
    --bg-card: #2B372A;
    --accent-lime: #87F32E;
    --accent-muted: rgba(135, 243, 46, 0.6);
    --text-pale: #D5E5D8;
    --bg-input: #131613;
    --btn-gradient: linear-gradient(266.19deg, #4E8D1B -10.11%, #87F32E 88.63%);
    
    /* Typography */
    --font-inter: 'Inter', sans-serif;
    --font-mono: 'Intel One Mono', monospace;
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    background: var(--bg-dark);
    color: var(--text-pale);
    font-family: var(--font-mono);
    display: flex;
    justify-content: center;
    min-height: 100vh;
    padding: 64px 0;
}

.app-wrapper {
    width: 1248px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 64px;
}

header {
    width: 738px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 11px;
}

h1 {
    width: 738px;
    height: 97px;
    font-family: var(--font-inter);
    font-style: normal;
    font-weight: 800;
    font-size: 80px;
    line-height: 97px;
    text-align: center;
    color: var(--text-pale);
    margin: 0 auto;
}

.subtitle {
    width: 738px;
    font-family: var(--font-mono);
    font-style: normal;
    font-weight: 500;
    font-size: 18px;
    line-height: 25px;
    text-align: center;
    color: var(--text-pale);
    margin: 0 auto;
}

main {
    display: flex;
    flex-direction: row;
    align-items: flex-start;
    gap: 64px;
    width: 1248px;
}

.sidebar {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    padding: 32px;
    gap: 24px;
    width: 440px;
    background: var(--bg-card);
    border-radius: 16px;
    position: relative;
}

.sidebar-inner {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    padding: 0px;
    gap: 48px;
    width: 376px;
    align-self: stretch;
    flex-grow: 1;
}

.control-group {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    padding: 0px;
    gap: 12px;
    width: 100%;
}

.section-label {
    font-family: var(--font-inter);
    font-style: normal;
    font-weight: 700;
    font-size: 14px;
    line-height: 17px;
    text-transform: uppercase;
    color: var(--accent-lime);
}

.expert-list {
    display: flex;
    flex-direction: column;
    gap: 16px;
    width: 100%;
}

.expert-btn {
    box-sizing: border-box;
    display: flex;
    flex-direction: row;
    align-items: center;
    padding: 10px;
    width: 100%;
    height: 55px;
    background: var(--bg-dark);
    border: 0.5px solid var(--accent-lime);
    border-radius: 8px;
    color: var(--accent-lime);
    font-family: var(--font-mono);
    font-weight: 500;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.2s;
}

.expert-btn.active {
    background: var(--accent-lime);
    color: var(--bg-dark);
}

.drop-zone {
    position: relative;
    width: 100%;
}

textarea, .text-input {
    box-sizing: border-box;
    width: 100%;
    background: var(--bg-dark);
    border: 0.5px solid var(--accent-lime);
    border-radius: 8px;
    padding: 10px;
    color: var(--accent-lime);
    font-family: var(--font-mono);
    font-size: 14px;
    line-height: 19px;
    outline: none;
}

textarea { height: 195px; resize: none; }
.text-input { height: 55px; }

::placeholder {
    color: var(--accent-muted);
}

.image-preview-container {
    margin-top: 12px;
    width: 100%;
}

.image-thumbnails {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
}

.image-item {
    position: relative;
    width: 60px;
    height: 60px;
    background: var(--bg-dark);
    border: 0.5px solid var(--accent-lime);
    border-radius: 4px;
    overflow: hidden;
}

.image-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.remove-img-btn {
    position: absolute;
    top: 2px;
    right: 2px;
    width: 16px;
    height: 16px;
    background: rgba(19, 22, 19, 0.8);
    color: var(--accent-lime);
    border: 0.5px solid var(--accent-lime);
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 10px;
    cursor: pointer;
    font-weight: bold;
}

.action-zone {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    margin-top: auto;
}

.btn-primary {
    width: 100%;
    height: 54px;
    background: var(--btn-gradient);
    border: 0.5px solid var(--accent-lime);
    border-radius: 8px;
    color: var(--bg-dark);
    font-family: var(--font-mono);
    font-weight: 600;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
}

.status-bar {
    width: 100%;
    font-family: var(--font-mono);
    font-size: 12px;
    line-height: 17px;
    text-align: center;
    color: var(--accent-lime);
}

.content-area {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 24px;
    width: 744px;
}

.card {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    padding: 32px;
    gap: 24px;
    width: 744px;
    background: var(--bg-card);
    border-radius: 16px;
}

.card-header {
    display: flex;
    flex-direction: row;
    justify-content: space-between;
    align-items: flex-start;
    width: 100%;
}

.badge {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 4px 12px;
    background: rgba(135, 243, 46, 0.3);
    border-radius: 100px;
    color: var(--accent-lime);
    font-family: var(--font-inter);
    font-weight: 700;
    font-size: 12px;
    text-transform: uppercase;
}

.status-label {
    color: var(--accent-lime);
    font-family: var(--font-inter);
    font-weight: 700;
    font-size: 12px;
    text-transform: uppercase;
    text-align: right;
}

.progress-info {
    display: flex;
    flex-direction: row;
    justify-content: space-between;
    align-items: center;
    width: 100%;
}

.loading-text { font-family: var(--font-mono); font-size: 14px; color: var(--accent-lime); }
.progress-track { width: 75px; height: 4px; background: rgba(135, 243, 46, 0.1); border-radius: 2px; }
.progress-fill { height: 100%; background: var(--accent-lime); width: 0%; }

.analysis-label { font-family: var(--font-mono); font-size: 14px; color: var(--accent-lime); }
.analysis-output { width: 100%; display: flex; flex-direction: column; gap: 24px; }

.analysis-section h3 {
    font-family: var(--font-inter);
    font-weight: 700;
    font-size: 16px;
    text-transform: uppercase;
    color: var(--accent-lime);
    margin-bottom: 12px;
    margin-top: 32px;
    border-left: 3px solid var(--accent-lime);
    padding-left: 10px;
}

.result-box {
    box-sizing: border-box;
    width: 100%;
    background: var(--bg-dark);
    border: 0.5px solid var(--accent-lime);
    border-radius: 8px;
    padding: 16px;
    font-family: var(--font-mono);
    font-size: 14px;
    line-height: 1.6;
    color: var(--accent-lime);
    overflow-x: auto;
}

.markdown-body table {
    width: 100%;
    border-collapse: collapse;
    margin: 16px 0;
}

.markdown-body th, .markdown-body td {
    border: 1px solid var(--accent-lime);
    padding: 8px 12px;
    text-align: left;
}

.markdown-body th {
    background: rgba(135, 243, 46, 0.1);
    font-weight: bold;
}

.markdown-body ul, .markdown-body ol {
    margin-left: 20px;
    margin-bottom: 16px;
}

.markdown-body p {
    margin-bottom: 16px;
}

.markdown-body p:last-child {
    margin-bottom: 0;
}

.hidden { display: none; }
    </style>
</head>
<body>

    <div class="app-wrapper">
        <header>
            <h1>Skilled Reviewer</h1>
            <p class="subtitle">For website clarity, trust and conversion friction</p>
        </header>

        <main>
            <!-- Sidebar (Frame 36230) -->
            <aside class="sidebar">
                <div class="sidebar-inner">
                    
                    <!-- Select Expert (Frame 36244) -->
                    <div class="control-group">
                        <span class="section-label">Select Expert</span>
                        <div class="expert-list">
                            <button class="expert-btn active" data-skill="copy">Skill 1: Copy</button>
                            <button class="expert-btn" data-skill="structure">Skill 2: Structure</button>
                            <button class="expert-btn" data-skill="aesthetic">Skill 3: Visual</button>
                            <button class="expert-btn" data-skill="recap">Skill 4: Recap</button>
                        </div>
                    </div>

                    <!-- Input Section (Frame 36228) -->
                    <div class="expert-list" style="gap: 36px;">
                        
                        <!-- Source Input (Frame 36245) -->
                        <div class="control-group">
                            <span class="section-label">Source Input</span>
                            <div class="drop-zone" id="dropZone">
                                <textarea id="userInput" placeholder="Insert url, text or screen"></textarea>
                                <input type="file" id="imageInput" accept="image/*" style="display: none;">
                                <div id="imageContainer" class="image-preview-container hidden">
                                    <div id="imageList" class="image-thumbnails"></div>
                                </div>
                            </div>
                        </div>

                        <!-- Context Layer (Frame 36243) -->
                        <div class="control-group">
                            <span class="section-label">Context Layer</span>
                            <input type="text" id="contextInput" class="text-input" placeholder="e.g. Psychologist, Coach, Counselor">
                        </div>

                    </div>

                    <!-- Action Zone (Frame 36227) -->
                    <div class="action-zone">
                        <button id="runBtn" class="btn-primary">Run Expert</button>
                        <p id="statusMsg" class="status-bar"></p>
                    </div>

                </div>
            </aside>

            <!-- Content Area (Frame 36240) -->
            <section class="content-area">
                
                <!-- Progress Card (Frame 36231) -->
                <div id="progressCard" class="card hidden">
                    <div class="card-header">
                        <span class="badge" id="currentSkillBadge">Skill 2</span>
                        <span class="status-label">Wait for the expert to generate the analysis</span>
                    </div>
                    <div class="progress-info">
                        <span class="loading-text" id="percentText">loading 07%</span>
                        <div class="progress-track">
                            <div id="progressBarFill" class="progress-fill"></div>
                        </div>
                    </div>
                </div>

                <!-- Result Card (Frame 36232) -->
                <div id="resultCard" class="card hidden">
                    <div class="card-header">
                        <span class="badge" id="resultSkillBadge">Skill 2</span>
                        <span class="status-label" id="resultScoreBadge">Overall Score __</span>
                    </div>
                    
                    <span class="analysis-label">Analysis text</span>
                    
                    <div id="analysisResult" class="analysis-output">
                        <!-- Result HTML will be injected here -->
                    </div>
                </div>

                <!-- Empty State -->
                <div id="emptyState" class="card">
                    <div style="text-align: center; width: 100%; color: var(--accent-lime); opacity: 0.6;">
                        <p>Analysis will appear here.</p>
                    </div>
                </div>

            </section>
        </main>
    </div>

    <!-- Logic -->
    <script>
document.addEventListener('DOMContentLoaded', () => {
    // UI Elements
    const expertBtns = document.querySelectorAll('.expert-btn');
    const runBtn = document.getElementById('runBtn');
    const userInput = document.getElementById('userInput');
    const contextInput = document.getElementById('contextInput');
    const statusMsg = document.getElementById('statusMsg');
    
    const dropZone = document.getElementById('dropZone');
    const imageInput = document.getElementById('imageInput');
    const imageContainer = document.getElementById('imageContainer');
    const imageList = document.getElementById('imageList');

    const emptyState = document.getElementById('emptyState');
    const progressCard = document.getElementById('progressCard');
    const resultCard = document.getElementById('resultCard');
    
    const progressBarFill = document.getElementById('progressBarFill');
    const percentText = document.getElementById('percentText');
    const analysisResult = document.getElementById('analysisResult');
    
    const currentSkillBadge = document.getElementById('currentSkillBadge');
    const resultSkillBadge = document.getElementById('resultSkillBadge');
    const resultScoreBadge = document.getElementById('resultScoreBadge');

    let selectedSkill = 'copy';
    let analysisHistory = {};
    let selectedImagesData = []; // Array for multiple images

    // Expert Selection Logic
    expertBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            expertBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            selectedSkill = btn.dataset.skill;
            
            if (analysisHistory[selectedSkill]) {
                const skillName = {
                    'copy': 'Skill 1', 'structure': 'Skill 2', 'aesthetic': 'Skill 3', 'recap': 'Skill 4'
                }[selectedSkill];
                
                analysisResult.innerHTML = formatAnalysis(analysisHistory[selectedSkill]);
                resultSkillBadge.innerText = skillName;
                
                const scoreMatch = analysisHistory[selectedSkill].match(/(?:Score|Punteggio):\s*\*?\*?(\d+)/i);
                if (scoreMatch) {
                    resultScoreBadge.innerText = `Overall Score ${scoreMatch[1]}/100`;
                } else {
                    resultScoreBadge.innerText = `Overall Score __`;
                }

                emptyState.classList.add('hidden');
                progressCard.classList.add('hidden');
                resultCard.classList.remove('hidden');
                statusMsg.innerText = "Loaded from history";
            } else {
                const displayName = btn.innerText.includes(': ') ? btn.innerText.split(': ')[1] : btn.innerText;
                statusMsg.innerText = `${displayName.toUpperCase()} selected`;
                emptyState.classList.remove('hidden');
                progressCard.classList.add('hidden');
                resultCard.classList.add('hidden');
            }
        });
    });

    // Image Upload Handlers
    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.classList.add('dragover');
    });

    dropZone.addEventListener('dragleave', () => {
        dropZone.classList.remove('dragover');
    });

    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        Array.from(e.dataTransfer.files).forEach(file => {
            if (file && file.type.startsWith('image/')) {
                handleImageFile(file);
            }
        });
    });

    userInput.addEventListener('paste', (e) => {
        const items = e.clipboardData.items;
        for (let i = 0; i < items.length; i++) {
            if (items[i].type.indexOf('image') !== -1) {
                const file = items[i].getAsFile();
                handleImageFile(file);
            }
        }
    });

    function handleImageFile(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            selectedImagesData.push(e.target.result);
            renderThumbnails();
        };
        reader.readAsDataURL(file);
    }

    function renderThumbnails() {
        imageList.innerHTML = '';
        if (selectedImagesData.length > 0) {
            imageContainer.classList.remove('hidden');
            selectedImagesData.forEach((data, index) => {
                const item = document.createElement('div');
                item.className = 'image-item';
                item.innerHTML = `
                    <img src="${data}" alt="Thumbnail">
                    <div class="remove-img-btn" data-index="${index}">×</div>
                `;
                imageList.appendChild(item);
            });

            // Re-attach removal listeners
            document.querySelectorAll('.remove-img-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const idx = parseInt(e.target.dataset.index);
                    selectedImagesData.splice(idx, 1);
                    renderThumbnails();
                });
            });
        } else {
            imageContainer.classList.add('hidden');
        }
    }

    // Progress Bar Animation
    function animateProgress(duration) {
        let start = 0;
        const interval = 50;
        const step = (interval / duration) * 100;
        
        emptyState.classList.add('hidden');
        progressCard.classList.remove('hidden');
        resultCard.classList.add('hidden');
        
        const timer = setInterval(() => {
            start += step;
            if (start >= 98) {
                clearInterval(timer);
                start = 98;
            }
            progressBarFill.style.width = `${start}%`;
            percentText.innerText = `loading ${Math.floor(start).toString().padStart(2, '0')}%`;
        }, interval);

        return timer;
    }

    runBtn.addEventListener('click', async () => {
        const input = userInput.value.trim();
        const context = contextInput.value.trim();

        if (!input && selectedImagesData.length === 0) {
            statusMsg.innerText = "Error: Input required";
            return;
        }

        const skillName = {
            'copy': 'Skill 1',
            'structure': 'Skill 2',
            'aesthetic': 'Skill 3',
            'recap': 'Skill 4'
        }[selectedSkill];

        statusMsg.innerText = `${skillName} is now running`;
        currentSkillBadge.innerText = skillName;
        
        const progressTimer = animateProgress(selectedImagesData.length > 1 ? 8000 : 5000);
        
        progressCard.scrollIntoView({ behavior: 'smooth', block: 'start' });

        try {
            let finalInput = input;
            if (selectedSkill === 'recap') {
                const historyText = Object.entries(analysisHistory)
                    .map(([skill, result]) => `--- ANALYSIS ${skill.toUpperCase()} ---\n${result.substring(0, 2500)}`)
                    .join('\n\n');
                finalInput = `HISTORY OF PREVIOUS ANALYSES:\n${historyText}\n\nURL/SITE: ${input}`;
            }

            const baseUrl = window.location.href.split('?')[0].split('#')[0].replace(/\/$/, '');
            const response = await fetch(`${baseUrl}/analyze`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    input: finalInput, 
                    skill_type: selectedSkill,
                    context: context,
                    images: selectedImagesData // Send array of images
                })
            });

            const data = await response.json();
            clearInterval(progressTimer);

            if (data.status === 'success') {
                progressBarFill.style.width = '100%';
                percentText.innerText = 'loading 100%';

                setTimeout(() => {
                    progressCard.classList.add('hidden');
                    resultCard.classList.remove('hidden');
                    resultSkillBadge.innerText = skillName;
                    
                    const scoreMatch = data.analysis.match(/(?:Score|Punteggio|Rating|Valutazione).*?(\d+)\s*\/\s*100/i) || 
                                     data.analysis.match(/(?:Score|Punteggio|Rating|Valutazione):\s*\*?\*?(\d+)/i);
                                     
                    if (scoreMatch) {
                        resultScoreBadge.innerText = `Overall Score ${scoreMatch[1]}/100`;
                    } else {
                        resultScoreBadge.innerText = `Overall Score __`;
                    }

                    analysisResult.innerHTML = formatAnalysis(data.analysis);
                    analysisHistory[selectedSkill] = data.analysis;
                    statusMsg.innerText = "Done";
                }, 500);

            } else {
                statusMsg.innerText = "Error: " + data.message;
                progressCard.classList.add('hidden');
                emptyState.classList.remove('hidden');
            }
        } catch (error) {
            clearInterval(progressTimer);
            statusMsg.innerText = "Connection failed";
            progressCard.classList.add('hidden');
            emptyState.classList.remove('hidden');
            console.error(error);
        }
    });

    function formatAnalysis(text) {
        if (!text) return "";
        let cleanText = text.trim().replace(/\r\n/g, '\n');
        const parts = cleanText.split(/^(?=#+ )/gm);
        
        return parts.map(part => {
            if (!part.trim()) return "";
            let headerMatch = part.match(/^(#+ .*)\n([\s\S]*)/);
            let headerHtml = "";
            let content = part;
            if (headerMatch) {
                const headerText = headerMatch[1].replace(/#+\s*/, '');
                headerHtml = `<h3>${headerText}</h3>`;
                content = headerMatch[2];
            }
            let formattedContent = content.trim() ? marked.parse(content.trim()) : "";
            if (!formattedContent && !headerHtml) return "";
            const contentHtml = formattedContent ? `<div class="result-box markdown-body">${formattedContent}</div>` : "";
            return `<div class="analysis-section">${headerHtml}${contentHtml}</div>`;
        }).join('\n');
    }
});
    </script>
</body>
</html>
